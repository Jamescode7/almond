name: JamesViewer
options:
  bundleIdPrefix: com.jamescode
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: en
  groupSortPosition: top

packages:
  SwiftMarkdown:
    url: https://github.com/apple/swift-markdown.git
    from: 0.3.0
  JamesViewerCore:
    path: .

targets:
  JamesViewer:
    type: application
    platform: macOS
    sources:
      - path: Sources/JamesViewerApp
        excludes:
          - "Info.plist"
          - "JamesViewer.entitlements"
      - path: Resources
        buildPhase: resources
        excludes:
          - "fixtures/**"
    info:
      path: Sources/JamesViewerApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: JamesViewer
        CFBundleDisplayName: JamesViewer
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "Copyright © 2026 James. MIT License."
        LSApplicationCategoryType: public.app-category.productivity
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.markdown
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
              public.mime-type:
                - text/markdown
    entitlements:
      path: Sources/JamesViewerApp/JamesViewer.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamescode.JamesViewer
        PRODUCT_NAME: JamesViewer
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: SwiftMarkdown
        product: Markdown
      - package: JamesViewerCore
        product: JamesViewerCore
